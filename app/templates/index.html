<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GM Full-Size SUV AI Shop System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #0f172a;
      color: #e5e7eb;
    }
    h1, h2, h3 { margin-bottom: 10px; }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }
    .card {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }
    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #1f2937;
      color: #fff;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      cursor: pointer;
      font-weight: 700;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .case-item {
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #0b1220;
      cursor: pointer;
    }
    .case-item:hover {
      border-color: #60a5fa;
      background: #111827;
    }
    .muted { color: #9ca3af; font-size: 14px; }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
    }
    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #1e3a8a;
      font-size: 12px;
      margin-right: 6px;
      margin-top: 6px;
    }
    ul {
      margin-top: 8px;
      padding-left: 18px;
    }
    .error {
      color: #fca5a5;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>GM Full-Size SUV AI Shop System</h1>
  <p class="muted">VIN intake → DTC/symptoms → triage suggestions → case lookup</p>

  <div class="grid">
    <div>
      <div class="card">
        <h2>Create Case</h2>

        <input id="vin" placeholder="VIN" />
        <div class="row">
          <input id="engine" placeholder="Engine (optional)" />
          <input id="mileage" type="number" placeholder="Mileage (optional)" />
        </div>
        <input id="dtcs" placeholder="DTCs (comma-separated)" />
        <input id="symptoms" placeholder="Symptoms (comma-separated)" />
        <textarea id="notes" placeholder="Notes (optional)"></textarea>

        <button id="createBtn">Create Case</button>
      </div>

      <div class="card">
        <h2>Run Triage</h2>
        <input id="caseId" placeholder="Case ID" />
        <button id="triageBtn">Run Triage by Case ID</button>
      </div>

      <div class="card">
        <h2>Possible issues & suggested checks</h2>
        <div id="triageResults">Create or select a case to see triage results.</div>
      </div>

      <div class="card">
        <h3>Raw response</h3>
        <pre id="rawResponse">{}</pre>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Recent Cases</h2>
        <input id="vinFilter" placeholder="Filter by VIN (optional)" />
        <button id="refreshCasesBtn">Refresh Cases</button>
        <div id="caseList" class="muted">Loading cases...</div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function splitCSV(value) {
      return value
        .split(",")
        .map(s => s.trim())
        .filter(Boolean);
    }

    function fmtDate(value) {
      if (!value) return "";
      try {
        return new Date(value).toLocaleString();
      } catch {
        return value;
      }
    }

    function setRaw(data) {
      $("rawResponse").textContent = JSON.stringify(data, null, 2);
    }

    function showError(message, data = null) {
      $("triageResults").innerHTML = `<p class="error">${message}</p>`;
      if (data) setRaw(data);
    }

    function renderTriage(data) {
      const hits = data?.triage?.hits || [];
      const container = $("triageResults");

      if (!hits.length) {
        container.innerHTML = "<p class='muted'>No triage hits returned.</p>";
        return;
      }

      container.innerHTML = hits.map((hit, i) => `
        <div class="case-item" style="cursor:default;">
          <strong>#${i + 1} ${hit.name || "Unnamed Rule"}</strong>
          <div class="muted">Category: ${hit.category || "n/a"} | Score: ${hit.score ?? "n/a"}</div>

          <div style="margin-top:10px;"><strong>Likely causes</strong></div>
          <div>
            ${(hit.probable_causes || []).map(c => `
              <span class="pill">${c.cause} (${c.weight})</span>
            `).join("") || "<span class='muted'>None</span>"}
          </div>

          <div style="margin-top:10px;"><strong>Suggested checks</strong></div>
          <ul>
            ${(hit.suggested_checks || []).map(x => `<li>${x}</li>`).join("") || "<li>No checks returned</li>"}
          </ul>
        </div>
      `).join("");
    }

    async function loadCases() {
      try {
        const vin = $("vinFilter").value.trim().toUpperCase();
        let url = "/api/cases?limit=25";
        if (vin) url += `&vin=${encodeURIComponent(vin)}`;

        const res = await fetch(url);
        const data = await res.json();
        const rows = data.cases || [];
        const list = $("caseList");

        if (!rows.length) {
          list.innerHTML = "<p class='muted'>No cases found.</p>";
          return;
        }

        list.innerHTML = rows.map(c => `
          <div class="case-item" onclick="selectCase(${c.id})">
            <strong>Case #${c.id}</strong>
            <div class="muted">${fmtDate(c.created_at)}</div>
            <div><strong>VIN:</strong> ${c.vin || ""}</div>
            <div><strong>Engine:</strong> ${c.engine || "-"}</div>
            <div><strong>Mileage:</strong> ${c.mileage ?? "-"}</div>
            <div><strong>DTCs:</strong> ${(c.dtcs || []).join(", ") || "-"}</div>
            <div><strong>Symptoms:</strong> ${(c.symptoms || []).join(", ") || "-"}</div>
          </div>
        `).join("");
      } catch (err) {
        $("caseList").innerHTML = `<p class="error">Failed to load cases.</p>`;
      }
    }

    async function selectCase(id) {
      try {
        $("caseId").value = id;
        const res = await fetch(`/api/cases/${id}`);
        const data = await res.json();
        setRaw(data);
      } catch (err) {
        showError("Failed to load selected case.");
      }
    }

    window.selectCase = selectCase;

    $("createBtn").addEventListener("click", async () => {
      try {
        const payload = {
          vin: $("vin").value.trim(),
          engine: $("engine").value.trim() || null,
          mileage: $("mileage").value ? Number($("mileage").value) : null,
          dtcs: splitCSV($("dtcs").value),
          symptoms: splitCSV($("symptoms").value),
          notes: $("notes").value.trim() || null
        };

        const res = await fetch("/api/cases", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        setRaw(data);

        if (!res.ok) {
          showError("Create failed.", data);
          return;
        }

        if (data?.case?.id) {
          $("caseId").value = data.case.id;
        }

        renderTriage(data);
        await loadCases();
      } catch (err) {
        showError("Create failed. Check console or backend logs.");
      }
    });

    $("triageBtn").addEventListener("click", async () => {
      try {
        const caseId = $("caseId").value.trim();
        if (!caseId) {
          showError("Enter or select a Case ID first.");
          return;
        }

        const res = await fetch(`/api/cases/${caseId}/triage`, { method: "POST" });
        const data = await res.json();
        setRaw(data);

        if (!res.ok) {
          showError("Triage failed.", data);
          return;
        }

        renderTriage(data);
        await loadCases();
      } catch (err) {
        showError("Triage failed. Check console or backend logs.");
      }
    });

    $("refreshCasesBtn").addEventListener("click", loadCases);

    loadCases();
  </script>
</body>
</html>
