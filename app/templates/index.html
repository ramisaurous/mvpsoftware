<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GM Full-Size SUV AI Shop System</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
      h1 { margin: 0 0 8px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; }
      label { display: block; font-size: 12px; margin: 10px 0 6px; opacity: 0.85; }
      input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font: inherit; }
      textarea { min-height: 92px; resize: vertical; }
      button { padding: 10px 14px; border: 1px solid #111; border-radius: 10px; background: #111; color: #fff; cursor: pointer; }
      button.secondary { background: #fff; color: #111; }
      pre { white-space: pre-wrap; word-break: break-word; background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 12px; }
      .row { display: flex; gap: 10px; align-items: end; }
      .row > * { flex: 1; }
      .muted { opacity: 0.75; font-size: 13px; }
    </style>
  </head>

  <body>
    <h1>GM Full-Size SUV AI Shop System</h1>
    <div class="muted">VIN intake → DTC/symptoms → triage suggestions</div>

    <div class="grid" style="margin-top: 16px;">
      <div class="card">
        <h2 style="margin-top:0;">Create Case</h2>

        <label for="vin">VIN</label>
        <input id="vin" placeholder="17-char VIN" />

        <div class="row">
          <div>
            <label for="engine">Engine (optional)</label>
            <input id="engine" placeholder="L84 / L87" />
          </div>
          <div>
            <label for="mileage">Mileage (optional)</label>
            <input id="mileage" placeholder="e.g. 65000" inputmode="numeric" />
          </div>
        </div>

        <label for="dtcs">DTCs (comma-separated)</label>
        <input id="dtcs" placeholder="P0300, P0171" />

        <label for="symptoms">Symptoms (comma-separated)</label>
        <input id="symptoms" placeholder="rough idle, stalls at stop, vibration over 60mph" />

        <label for="notes">Notes (optional)</label>
        <textarea id="notes" placeholder="Any extra context..."></textarea>

        <div class="row" style="margin-top: 10px;">
          <!-- IMPORTANT: type="button" prevents accidental form submit/reload -->
          <button type="button" onclick="createCase()">Create</button>
          <button type="button" class="secondary" onclick="runTriage()">Run Triage (by Case ID)</button>
        </div>

        <label for="caseId" style="margin-top: 12px;">Case ID (auto-filled after Create)</label>
        <input id="caseId" placeholder="e.g. 123" inputmode="numeric" />
      </div>

      <div class="card">
        <h2 style="margin-top:0;">Possible issues & suggested checks</h2>
        <pre id="triageOut">Create a case to see triage results.</pre>

        <h3>Raw response</h3>
        <pre id="createOut">{}</pre>
      </div>
    </div>

    <script>
      const j = (x) => JSON.stringify(x, null, 2);

      function renderHits(hits) {
        if (!Array.isArray(hits) || hits.length === 0) return "No triage hits.";
        return hits.slice(0, 10).map((h, i) => {
          const title = h?.name ?? h?.rule_name ?? h?.rule_id ?? "Unknown";
          const score = (h?.score ?? h?.weight ?? "");
          const causes = Array.isArray(h?.likely_causes) ? h.likely_causes.join(", ") : "";
          const checks = Array.isArray(h?.checks) ? h.checks.map(c => `- ${c}`).join("\n") : "";
          return `${i + 1}. ${title}${score !== "" ? ` (score: ${score})` : ""}\nCauses: ${causes}\nChecks:\n${checks}`;
        }).join("\n\n");
      }

      function extractHits(data) {
        return (data?.triage?.hits ?? data?.case?.triage_snapshot?.hits ?? []);
      }

      async function safeReadJson(res) {
        const text = await res.text(); // always works
        try {
          return { ok: true, data: JSON.parse(text), raw: text };
        } catch {
          return { ok: false, data: null, raw: text };
        }
      }

      async function createCase() {
        document.getElementById("triageOut").textContent = "Creating case...";
        document.getElementById("createOut").textContent = "{}";

        const payload = {
          vin: document.getElementById("vin").value,
          engine: document.getElementById("engine").value || null,
          mileage: parseInt(document.getElementById("mileage").value || "", 10) || null,
          dtcs: (document.getElementById("dtcs").value || "").split(",").map(s => s.trim()).filter(Boolean),
          symptoms: (document.getElementById("symptoms").value || "").split(",").map(s => s.trim()).filter(Boolean),
          notes: document.getElementById("notes").value || null,
        };

        try {
          const res = await fetch("/api/cases", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const parsed = await safeReadJson(res);

          document.getElementById("createOut").textContent =
            `HTTP ${res.status} ${res.statusText}\n\n` +
            (parsed.ok ? j(parsed.data) : parsed.raw);

          if (!res.ok) {
            document.getElementById("triageOut").textContent =
              `Create failed (HTTP ${res.status}). See Raw response.`;
            return;
          }

          if (!parsed.ok || !parsed.data) {
            document.getElementById("triageOut").textContent =
              `Create succeeded but response was not JSON (HTTP ${res.status}). See Raw response.`;
            return;
          }

          const data = parsed.data;

          const caseId = data?.case?.id;
          if (caseId != null) document.getElementById("caseId").value = String(caseId);

          const hits = extractHits(data);
          document.getElementById("triageOut").textContent = renderHits(hits);
        } catch (e) {
          document.getElementById("triageOut").textContent =
            "Fetch failed (true network error).";
          document.getElementById("createOut").textContent = String(e);
        }
      }

      async function runTriage() {
        const caseId = document.getElementById("caseId").value.trim();
        if (!caseId) {
          document.getElementById("triageOut").textContent = "Enter a Case ID first.";
          return;
        }

        document.getElementById("triageOut").textContent = "Running triage...";

        try {
          const res = await fetch(`/api/cases/${encodeURIComponent(caseId)}/triage`, { method: "POST" });
          const parsed = await safeReadJson(res);

          document.getElementById("createOut").textContent =
            `HTTP ${res.status} ${res.statusText}\n\n` +
            (parsed.ok ? j(parsed.data) : parsed.raw);

          if (!res.ok) {
            document.getElementById("triageOut").textContent =
              `Triage failed (HTTP ${res.status}). See Raw response.`;
            return;
          }

          if (!parsed.ok || !parsed.data) {
            document.getElementById("triageOut").textContent =
              `Triage succeeded but response was not JSON (HTTP ${res.status}). See Raw response.`;
            return;
          }

          const data = parsed.data;
          const hits = extractHits(data);
          document.getElementById("triageOut").textContent = renderHits(hits);
        } catch (e) {
          document.getElementById("triageOut").textContent =
            "Fetch failed (true network error).";
          document.getElementById("createOut").textContent = String(e);
        }
      }
    </script>
  </body>
</html>
