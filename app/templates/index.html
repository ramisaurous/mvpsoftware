<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GM Full-Size SUV AI Shop System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #0f172a;
      color: #e5e7eb;
    }

    h1, h2, h3 {
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }

    .card {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #1f2937;
      color: #ffffff;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .case-item {
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #0b1220;
      cursor: pointer;
    }

    .case-item:hover {
      border-color: #60a5fa;
      background: #111827;
    }

    .muted {
      color: #9ca3af;
      font-size: 14px;
    }

    .error {
      color: #fca5a5;
      font-weight: 600;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
    }

    ul {
      margin-top: 8px;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>GM Full-Size SUV AI Shop System</h1>
  <p class="muted">VIN intake → DTC/symptoms → triage suggestions → case lookup</p>

  <div class="grid">
    <div>
      <div class="card">
        <h2>Create Case</h2>

        <input id="vin" placeholder="VIN" />
        <div class="row">
          <input id="engine" placeholder="Engine (optional)" />
          <input id="mileage" type="number" placeholder="Mileage (optional)" />
        </div>
        <input id="dtcs" placeholder="DTCs (comma-separated)" />
        <input id="symptoms" placeholder="Symptoms (comma-separated)" />
        <textarea id="notes" placeholder="Notes (optional)"></textarea>

        <button id="createBtn" type="button">Create Case</button>
      </div>

      <div class="card">
        <h2>Run Triage</h2>
        <input id="caseId" placeholder="Case ID" />
        <button id="triageBtn" type="button">Run Triage by Case ID</button>
      </div>

      <div class="card">
        <h2>Possible issues & suggested checks</h2>
        <div id="triageResults">Create or select a case to see triage results.</div>
      </div>

      <div class="card">
        <h3>Raw response</h3>
        <pre id="rawResponse">{}</pre>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Recent Cases</h2>
        <input id="vinFilter" placeholder="Filter by VIN (optional)" />
        <button id="refreshCasesBtn" type="button">Refresh Cases</button>
        <div id="caseList" class="muted">Loading cases...</div>
      </div>
    </div>
  </div>

  <script>
    function $(id) {
      return document.getElementById(id);
    }

    function splitCSV(value) {
      if (!value) return [];
      return value
        .split(",")
        .map(function (s) { return s.trim(); })
        .filter(Boolean);
    }

    function fmtDate(value) {
      if (!value) return "";
      try {
        return new Date(value).toLocaleString();
      } catch (e) {
        return value;
      }
    }

    function setRaw(data) {
      $("rawResponse").textContent = JSON.stringify(data, null, 2);
    }

    function showError(message, data) {
      $("triageResults").innerHTML = '<p class="error">' + message + '</p>';
      if (data) {
        setRaw(data);
      }
    }

    function renderTriage(data) {
      var hits = [];
      if (data && data.triage && Array.isArray(data.triage.hits)) {
        hits = data.triage.hits;
      }

      var container = $("triageResults");

      if (!hits.length) {
        container.innerHTML = '<p class="muted">No triage hits returned.</p>';
        return;
      }

      var html = "";

      hits.forEach(function (hit, index) {
        var causes = Array.isArray(hit.likely_causes) ? hit.likely_causes : [];
        var checks = Array.isArray(hit.checks) ? hit.checks : [];
        var matched = Array.isArray(hit.matched) ? hit.matched : [];

        var causesHtml = causes.length
          ? "<ul>" + causes.map(function (c) { return "<li>" + c + "</li>"; }).join("") + "</ul>"
          : "<ul><li>None</li></ul>";

        var checksHtml = checks.length
          ? "<ul>" + checks.map(function (c) { return "<li>" + c + "</li>"; }).join("") + "</ul>"
          : "<ul><li>No checks returned</li></ul>";

        html += ''
          + '<div class="case-item" style="cursor:default;">'
          +   '<strong>#' + (index + 1) + ' ' + (hit.name || 'Unnamed Rule') + '</strong>'
          +   '<div class="muted">'
          +     'Score: ' + (hit.score != null ? hit.score : 'n/a')
          +     (matched.length ? ' | Matched: ' + matched.join(', ') : '')
          +   '</div>'
          +   '<div style="margin-top:10px;"><strong>Likely causes</strong></div>'
          +   causesHtml
          +   '<div style="margin-top:10px;"><strong>Suggested checks</strong></div>'
          +   checksHtml
          + '</div>';
      });

      container.innerHTML = html;
    }

    async function loadCases() {
      try {
        var vin = $("vinFilter").value.trim().toUpperCase();
        var url = "/api/cases?limit=25";
        if (vin) {
          url += "&vin=" + encodeURIComponent(vin);
        }

        var res = await fetch(url);
        var data = await res.json();
        var rows = Array.isArray(data.cases) ? data.cases : [];
        var list = $("caseList");

        if (!rows.length) {
          list.innerHTML = '<p class="muted">No cases found.</p>';
          return;
        }

        var html = "";
        rows.forEach(function (c) {
          html += ''
            + '<div class="case-item" onclick="selectCase(' + c.id + ')">'
            +   '<strong>Case #' + c.id + '</strong>'
            +   '<div class="muted">' + fmtDate(c.created_at) + '</div>'
            +   '<div><strong>VIN:</strong> ' + (c.vin || '') + '</div>'
            +   '<div><strong>Engine:</strong> ' + (c.engine || '-') + '</div>'
            +   '<div><strong>Mileage:</strong> ' + (c.mileage != null ? c.mileage : '-') + '</div>'
            +   '<div><strong>DTCs:</strong> ' + ((c.dtcs || []).join(", ") || '-') + '</div>'
            +   '<div><strong>Symptoms:</strong> ' + ((c.symptoms || []).join(", ") || '-') + '</div>'
            + '</div>';
        });

        list.innerHTML = html;
      } catch (err) {
        $("caseList").innerHTML = '<p class="error">Failed to load cases.</p>';
      }
    }

    async function selectCase(id) {
      try {
        $("caseId").value = id;
        var res = await fetch("/api/cases/" + id);
        var data = await res.json();
        setRaw(data);
      } catch (err) {
        showError("Failed to load selected case.");
      }
    }

    async function createCase() {
      try {
        var payload = {
          vin: $("vin").value.trim(),
          engine: $("engine").value.trim() || null,
          mileage: $("mileage").value ? Number($("mileage").value) : null,
          dtcs: splitCSV($("dtcs").value),
          symptoms: splitCSV($("symptoms").value),
          notes: $("notes").value.trim() || null
        };

        var res = await fetch("/api/cases", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        var data = await res.json();
        setRaw(data);

        if (!res.ok) {
          showError("Create failed.", data);
          return;
        }

        if (data && data.case && data.case.id) {
          $("caseId").value = data.case.id;
        }

        renderTriage(data);
        await loadCases();
      } catch (err) {
        showError("Create failed. Check backend logs.");
      }
    }

    async function runTriage() {
      try {
        var caseId = $("caseId").value.trim();
        if (!caseId) {
          showError("Enter or select a Case ID first.");
          return;
        }

        var res = await fetch("/api/cases/" + caseId + "/triage", {
          method: "POST"
        });

        var data = await res.json();
        setRaw(data);

        if (!res.ok) {
          showError("Triage failed.", data);
          return;
        }

        renderTriage(data);
        await loadCases();
      } catch (err) {
        showError("Triage failed. Check backend logs.");
      }
    }

    window.selectCase = selectCase;

    document.addEventListener("DOMContentLoaded", function () {
      $("createBtn").addEventListener("click", createCase);
      $("triageBtn").addEventListener("click", runTriage);
      $("refreshCasesBtn").addEventListener("click", loadCases);
      loadCases();
    });
  </script>
</body>
</html>
